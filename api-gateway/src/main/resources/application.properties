spring.application.name=api-gateway
server.port=8080

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8762/eureka/
eureka.client.tls.enabled=false
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=auth-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[1].id=master-service
spring.cloud.gateway.routes[1].uri=lb://MASTER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/master/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=master-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[2].id=academic-service
spring.cloud.gateway.routes[2].uri=lb://ACADEMIC-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/academic/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=academic-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[3].id=admission-service
spring.cloud.gateway.routes[3].uri=lb://ADMISSION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admissions/**
spring.cloud.gateway.routes[3].filters[0]=CircuitBreaker=name=admission-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[4].id=fee-service
spring.cloud.gateway.routes[4].uri=lb://FEE-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/fees/**
spring.cloud.gateway.routes[4].filters[0]=CircuitBreaker=name=fee-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[5].id=exam-service
spring.cloud.gateway.routes[5].uri=lb://EXAM-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/exams/**
spring.cloud.gateway.routes[5].filters[0]=CircuitBreaker=name=exam-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=CircuitBreaker=name=notification-cb,fallbackUri=forward:/fallback

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=15s

resilience4j.timelimiter.instances.auth-cb.timeout-duration=15s
resilience4j.timelimiter.instances.master-cb.timeout-duration=10s
resilience4j.timelimiter.instances.academic-cb.timeout-duration=10s
resilience4j.timelimiter.instances.admission-cb.timeout-duration=10s
resilience4j.timelimiter.instances.fee-cb.timeout-duration=10s
resilience4j.timelimiter.instances.exam-cb.timeout-duration=10s
resilience4j.timelimiter.instances.notification-cb.timeout-duration=10s

management.endpoints.web.exposure.include=health,info,gateway,prometheus
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=http://localhost:8081/v3/api-docs

springdoc.swagger-ui.urls[1].name=Master Service
springdoc.swagger-ui.urls[1].url=http://localhost:8082/v3/api-docs

springdoc.swagger-ui.urls[2].name=Academic Service
springdoc.swagger-ui.urls[2].url=http://localhost:8083/v3/api-docs

springdoc.swagger-ui.urls[3].name=Admission Service
springdoc.swagger-ui.urls[3].url=http://localhost:8084/v3/api-docs

springdoc.swagger-ui.urls[4].name=Fee Service
springdoc.swagger-ui.urls[4].url=http://localhost:8085/v3/api-docs

springdoc.swagger-ui.urls[5].name=Exam Service
springdoc.swagger-ui.urls[5].url=http://localhost:8086/v3/api-docs

springdoc.swagger-ui.urls[6].name=Notification Service
springdoc.swagger-ui.urls[6].url=http://localhost:8087/v3/api-docs

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.erp.school.gateway=DEBUG

jwt.secret=SchoolERPSuperSecretKeyForJWTSigningMustBeAtLeast32BytesLong!!
jwt.expiration-ms=86400000
